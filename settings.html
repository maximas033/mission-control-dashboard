<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Mission Control • Settings</title><link rel='stylesheet' href='styles.css'></head><body><div class='app'><aside class='panel sidebar'><div class='brand'>Mission Control</div><div class='muted'>Standalone Project</div><nav class='nav'><a href='/'>Dashboard Overview</a><a href='/tasks'>Tasks</a><a href='/billing'>Billing</a><a href='/schedule'>Schedule</a><a href='/agents'>Agents</a><a class='active' href='/settings'>Settings</a></nav></aside><main class='main'><section class='panel top'><div class='row'><div><h1 style='margin:0'>Settings</h1><div class='muted'>Customize look & behavior</div></div><button id='themeIcon' class='icon-btn' onclick='toggleThemeIcon()' title='Toggle Light/Dark'>🌙</button></div></section><section class='panel card'><h3 style='margin:0'>Appearance</h3><div class='setting'><label>Glassiness <span id='glassVal'>52%</span></label><input id='glassRange' type='range' min='20' max='90' step='1' oninput='setGlass(this.value)'></div><div class='setting'><label>Blur <span id='blurVal'>16px</span></label><input id='blurRange' type='range' min='0' max='30' step='1' oninput='setBlur(this.value)'></div><div class='setting'><label>Roundness <span id='radiusVal'>24px</span></label><input id='radiusRange' type='range' min='8' max='32' step='1' oninput='setRadius(this.value)'></div></section><section class='panel card'><h3 style='margin:0'>Behavior</h3><div class='list' style='margin-top:10px'><div class='item'>Live data refresh interval: 30s (frontend) + 10min sync pipeline.</div><div class='item'>Theme and UI preferences are saved on this device.</div></div></section></main></div><script src='app.js'></script><script src='live.js'></script></body></html>
